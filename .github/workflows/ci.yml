name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pytest
        env:
          DATABASE_URL: sqlite:///./_ci_test.db
          JWT_SECRET: ci-test-secret-key
        run: |
          cd backend
          python -m pytest
          
  build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Validate Backend Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: fraudchills-backend:ci
          
      - name: Validate Frontend Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: fraudchills-frontend:ci
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@db:5432/fraudchills
